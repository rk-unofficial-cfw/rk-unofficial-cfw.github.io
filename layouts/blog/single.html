{{ define "main" }}
<main>
  <div class="container">
    <article class="post-article">
      <header class="post-header">
        <ol class="breadcrumb">
          <li class="breadcrumb-item"><a href="/">Home</a></li>
          <li class="breadcrumb-item"><span class="breadcrumb-sep" aria-hidden="true">›</span><a href="/blog/">Blog</a></li>
          <li class="breadcrumb-item"><span class="breadcrumb-sep" aria-hidden="true">›</span><span class="breadcrumb-current">{{ .Params.short_title | default .Title }}</span></li>
        </ol>
        <div class="post-meta">
          <time class="post-date" datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "January 2, 2006" }}</time>
          {{ range .Params.tags }}<span class="post-tag">{{ . }}</span>{{ end }}
        </div>
        <h1 class="page-title">{{ .Params.short_title | default .Title }}</h1>
        {{ with .Params.lead }}<p class="post-lead">{{ . }}</p>{{ end }}
      </header>
      <div class="prose">
        {{ .Content }}
      </div>
    </article>
  </div>
</main>
{{ end }}
